<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6f8350"/>
      <stop offset="55%" stop-color="#4f6038"/>
      <stop offset="100%" stop-color="#aa5f7e"/>
    </linearGradient>
    <radialGradient id="glow" cx="30%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- fondo con esquinas asimetricas, estilo card-nouveau -->
  <rect x="0" y="0" width="512" height="512" rx="120" ry="120" fill="url(#bg)"/>
  <rect x="0" y="0" width="512" height="512" rx="120" ry="120" fill="url(#glow)"/>

  <!-- filete dorado interior -->
  <rect x="22" y="22" width="468" height="468" rx="104" ry="104"
        fill="none" stroke="#c9a13b" stroke-width="6" opacity="0.55"/>

  <!-- tallo curvo central (whiplash curve) -->
  <path d="M256 392 C 256 340, 196 320, 196 268 C 196 224, 224 196, 256 188
           C 288 196, 316 224, 316 268 C 316 320, 256 340, 256 392 Z"
        fill="#fffaf0" opacity="0.95"/>

  <!-- nervaduras tipo cuchara/hoja -->
  <path d="M256 380 C 256 330, 240 300, 232 268" fill="none" stroke="#c9a13b" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <path d="M256 380 C 256 330, 272 300, 280 268" fill="none" stroke="#c9a13b" stroke-width="4" stroke-linecap="round" opacity="0.7"/>

  <!-- flor estilizada superior, 5 petalos curvos -->
  <g transform="translate(256,150)">
    <g fill="#e3c879">
      <path d="M0 0 C 14 -10, 14 -34, 0 -46 C -14 -34, -14 -10, 0 0 Z" opacity="0.95"/>
      <path d="M0 0 C 14 -10, 14 -34, 0 -46 C -14 -34, -14 -10, 0 0 Z" opacity="0.95" transform="rotate(72)"/>
      <path d="M0 0 C 14 -10, 14 -34, 0 -46 C -14 -34, -14 -10, 0 0 Z" opacity="0.95" transform="rotate(144)"/>
      <path d="M0 0 C 14 -10, 14 -34, 0 -46 C -14 -34, -14 -10, 0 0 Z" opacity="0.95" transform="rotate(216)"/>
      <path d="M0 0 C 14 -10, 14 -34, 0 -46 C -14 -34, -14 -10, 0 0 Z" opacity="0.95" transform="rotate(288)"/>
    </g>
    <circle cx="0" cy="0" r="11" fill="#aa5f7e"/>
  </g>

  <!-- zarcillos laterales -->
  <path d="M150 300 C 120 280, 110 240, 140 210" fill="none" stroke="#c9a13b" stroke-width="5" stroke-linecap="round" opacity="0.55"/>
  <circle cx="140" cy="210" r="6" fill="#c9a13b" opacity="0.6"/>
  <path d="M362 300 C 392 280, 402 240, 372 210" fill="none" stroke="#c9a13b" stroke-width="5" stroke-linecap="round" opacity="0.55"/>
  <circle cx="372" cy="210" r="6" fill="#c9a13b" opacity="0.6"/>
</svg>
